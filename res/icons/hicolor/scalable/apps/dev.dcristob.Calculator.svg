<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a4a6f"/>
      <stop offset="1" stop-color="#1f2a44"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#b8e6c1"/>
      <stop offset="1" stop-color="#7ec991"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.5"/>
      <feOffset dy="1.5"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- rounded square body -->
  <rect x="8" y="8" width="112" height="112" rx="22" ry="22" fill="url(#bg)"/>

  <!-- display / screen -->
  <rect x="22" y="22" width="84" height="28" rx="4" ry="4" fill="url(#screen)"/>
  <text x="100" y="44" text-anchor="end" font-family="'DejaVu Sans Mono', monospace"
        font-size="18" font-weight="600" fill="#1c3624">123.45</text>

  <!-- button grid: 4 cols x 4 rows -->
  <g filter="url(#shadow)" font-family="'DejaVu Sans', sans-serif" font-size="11" font-weight="700"
     text-anchor="middle" fill="#1f2a44">
    <!-- row 1: C  (  )  / -->
    <rect x="22" y="58" width="18" height="14" rx="3" fill="#e8c97a"/>
    <text x="31" y="68.5">C</text>
    <rect x="44" y="58" width="18" height="14" rx="3" fill="#d8dce6"/>
    <text x="53" y="68.5">(</text>
    <rect x="66" y="58" width="18" height="14" rx="3" fill="#d8dce6"/>
    <text x="75" y="68.5">)</text>
    <rect x="88" y="58" width="18" height="14" rx="3" fill="#ffb36b"/>
    <text x="97" y="68.5">÷</text>

    <!-- row 2: 7  8  9  × -->
    <rect x="22" y="76" width="18" height="14" rx="3" fill="#d8dce6"/>
    <text x="31" y="86.5">7</text>
    <rect x="44" y="76" width="18" height="14" rx="3" fill="#d8dce6"/>
    <text x="53" y="86.5">8</text>
    <rect x="66" y="76" width="18" height="14" rx="3" fill="#d8dce6"/>
    <text x="75" y="86.5">9</text>
    <rect x="88" y="76" width="18" height="14" rx="3" fill="#ffb36b"/>
    <text x="97" y="86.5">×</text>

    <!-- row 3: 4  5  6  − -->
    <rect x="22" y="94" width="18" height="14" rx="3" fill="#d8dce6"/>
    <text x="31" y="104.5">4</text>
    <rect x="44" y="94" width="18" height="14" rx="3" fill="#d8dce6"/>
    <text x="53" y="104.5">5</text>
    <rect x="66" y="94" width="18" height="14" rx="3" fill="#d8dce6"/>
    <text x="75" y="104.5">6</text>
    <rect x="88" y="94" width="18" height="14" rx="3" fill="#ffb36b"/>
    <text x="97" y="104.5">−</text>

    <!-- row 4: 1  2  3  = (=) spans last column taller? keep simple grid -->
    <rect x="22" y="112" width="18" height="6" rx="2" fill="#d8dce6"/>
    <rect x="44" y="112" width="18" height="6" rx="2" fill="#d8dce6"/>
    <rect x="66" y="112" width="18" height="6" rx="2" fill="#d8dce6"/>
    <rect x="88" y="112" width="18" height="6" rx="2" fill="#7ab8ff"/>
  </g>
</svg>
