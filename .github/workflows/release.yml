name: Release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute build metadata
        id: meta
        run: |
          echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +'%Y-%m-%d %H:%M UTC')" >> "$GITHUB_OUTPUT"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config \
            libxkbcommon-dev libxkbcommon-x11-dev \
            libwayland-dev libfontconfig1-dev libfreetype6-dev \
            libgl1-mesa-dev libegl1-mesa-dev \
            libgbm-dev libinput-dev libudev-dev

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release --locked

      - name: Stage release artifacts
        run: |
          mkdir -p dist
          cp target/release/cosmic-calc-plus dist/
          cp res/dev.dcristob.Calculator.desktop dist/
          cp res/dev.dcristob.Calculator.metainfo.xml dist/
          cp res/icons/hicolor/scalable/apps/dev.dcristob.Calculator.svg dist/

      - name: Publish rolling "latest" dev build
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest dev build (main) — ${{ steps.meta.outputs.date }}"
          body: |
            Rolling build from the tip of `main`, replaced on every push.
            For a stable download, use a versioned release below.

            Built: ${{ steps.meta.outputs.date }}
            Commit: `${{ steps.meta.outputs.short_sha }}` (`${{ github.sha }}`)
          files: |
            dist/cosmic-calc-plus
            dist/dev.dcristob.Calculator.desktop
            dist/dev.dcristob.Calculator.metainfo.xml
            dist/dev.dcristob.Calculator.svg
          make_latest: "false"
          prerelease: true

      - name: Publish versioned release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Calc Plus ${{ github.ref_name }}"
          generate_release_notes: true
          files: |
            dist/cosmic-calc-plus
            dist/dev.dcristob.Calculator.desktop
            dist/dev.dcristob.Calculator.metainfo.xml
            dist/dev.dcristob.Calculator.svg
          make_latest: "true"
          prerelease: false
